<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meme Mirror Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <main class="app-shell">
    <header class="title-wrap">
      <p class="eyebrow">Meme Mirror Web</p>
      <h1>Live Pose To Meme</h1>
      <p class="sub">For <span id="introName">OYO</span> • no app install • just camera permission</p>
    </header>

    <section class="stage">
      <article class="panel camera-panel">
        <div class="panel-head">
          <h2>You</h2>
          <span id="poseBadge" class="badge">STARING</span>
        </div>
        <canvas id="cameraCanvas" width="640" height="480" aria-label="Camera preview"></canvas>
      </article>

      <article class="panel meme-panel">
        <div class="panel-head">
          <h2>Meme Match</h2>
          <span id="moodText" class="mood">neutral stare</span>
        </div>
        <img id="memeView" src="memes/staring.jpg" alt="Current meme" />
      </article>
    </section>

    <section class="controls">
      <button id="startBtn" class="cta">Enable Camera</button>
      <p id="statusText" class="status">Ready. Click Enable Camera.</p>
      <p class="hint">Share URL with custom name: <span id="shareHint"></span></p>
    </section>
  </main>

  <video id="cameraVideo" autoplay playsinline muted hidden></video>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
  <script src="app.js"></script>
</body>
</html>
